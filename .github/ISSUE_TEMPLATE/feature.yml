name: Feature request
description: Suggest an idea or improvement for POLYROB
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation or limitation — not the solution yet.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like POLYROB to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried or thought about.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / REPL
        - Surfaces (telegram / email / etc.)
        - Autonomy (goals / cron / self-wake)
        - Tools (browser / MCP / code-exec / coding)
        - Memory / skills
        - Payments / wallet / x402
        - API (REST / A2A / OpenAI-compat)
        - Deployment / updates
        - other
