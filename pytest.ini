[pytest]
# Dev/manual scripts under scripts/ (e.g. scripts/test_openrouter.py) are live-key
# runners, not unit tests. Excluding them from collection removes live-key ERRORs and
# resolves the test_continuous_chat.py basename collision with the in-tree unit test.
norecursedirs = scripts .git .* build dist *.egg venv node_modules data

markers =
    integration: integration tests (may need external services)
    live: tests that require live API keys
    asyncio: mark a test as async (registered for pytest-asyncio compatibility)
